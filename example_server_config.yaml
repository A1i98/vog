github:
  tokens:
    - token: "ghp_your_other_server_token_here"
      transport: "git"
      repo: "yourname/your-private-tunnel-repo"
      batch_interval: 500ms
      fetch_interval: 1000ms

    # - token: "ghp_your_server_token_here"
    #   transport: "gist"
    #   batch_interval: 8000ms
    #   fetch_interval: 1000ms

  upstream_connections: 1
  batch_interval: 500ms
  fetch_interval: 1000ms
  api_timeout: 10s

cleanup:
  enabled: true
  interval: 10m
  dead_connection_ttl: 15m

proxy:
  target_timeout: 30s
  # Max bytes per Read from the upstream destination → one frame.
  # Bump (1-2 MiB) for video / large downloads.
  buffer_size: 2097152

encryption:
  algorithm: "xor"

logging:
  level: "info"
  format: "text"
  file: "/var/log/gh-tunnel/server.log"
